# ============================================================
# DaiTVbobox 影視聚合系統 — 上游源配置
# 新增來源只需在此 YAML 新增一條配置，無需修改程式碼
# 更新時間: 2026-06-24
# ============================================================

# ---- 全局設定 ----
settings:
  user_agent: "Mozilla/5.0 (Linux; Android 11; TV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  max_concurrent: 5
  default_timeout: 30
  default_retry: 3
  retry_delay: 2

# ---- 上游源列表 ----
sources:

  # ========== 飯太硬 (主源 · 最穩定) ==========
  # 老牌源，支援 4K，電影+電視劇+綜藝
  fantaiying:
    name: "飯太硬"
    url: "http://www.饭太硬.com/tv"
    type: "json"
    encoding: "utf-8"
    category: ["movie", "tv", "variety"]
    quality_support: ["4K", "1080P", "720P"]
    priority: 1
    timeout: 30
    retry: 3
    enabled: true

